<!doctype html>
<html lang="en">
  <head>

    <!-- ── Primary SEO ── -->
    <title>StarVyk</title>
    <meta name="description" content="Explore curated datasets and insightful articles with interactive charts. Open data, beautifully visualized." />

    <!-- ── Open Graph (Facebook, Instagram, WhatsApp, LinkedIn) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="StarVyk" />
    <meta property="og:title"       content="StarVyk" />
    <meta property="og:description" content="Explore curated datasets and insightful articles with interactive charts. Open data, beautifully visualized." />
    <meta property="og:url"         content="https://starvyk.vercel.app/" />
    <meta property="og:image"       content="https://starvyk.vercel.app/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="StarVyk preview" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="StarVyk" />

    <meta name="twitter:image"       content="https://starvyk.vercel.app/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
